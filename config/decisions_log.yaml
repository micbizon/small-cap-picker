  feedback_12m: null
- decision_id: DEC-004
  date: '2026-04-19'
  ticker: TSLA
  action: PASS
  position_size_pct: 0
  entry_price: 0.0
  entry_price_currency: USD
  core_thesis: 'Tesla nie spełnia minimum 3 z 5 kryteriów flywheel. Wynik 2/5 (częściowo
    kryterium 3 - ekosystem, oraz kryterium 4 - TAM) jest twardym odrzuceniem przez
    framework inwestycyjny. Kluczowy empiryczny dowód przeciwko tezie: marże brutto
    automotive spadły z 29.6% (Q1 2022) do ~16% (2024) przy jednoczesnym wzroście
    wolumenu z 936k do 1.79M pojazdów - to matematyczne obalenie mechanicznego flywheel
    kosztowego. Jedyny wiarygodny flywheel (Energy/Megapack) stanowi <10% przychodów
    i jest niewystarczający do uzasadnienia wyceny 80-100x forward PE. Cała asymetria
    3x w scenariuszu bazowym wymaga perfekcyjnej egzekucji Robotaxi + Optimus - to
    nie jest scenariusz bazowy, to scenariusz byczego ogona.'
  key_assumptions:
  - Framework wymaga minimum 3/5 kryteriów flywheel - TSLA spełnia 2/5, twarde odrzucenie
    niezależnie od ceny
  - 'Asymetria 3x w horyzoncie 5 lat przy SCENARIUSZU BAZOWYM jest niemożliwa do uzasadnienia:
    scenariusz bazowy to erodujące marże automotive + brak udowodnionych przychodów
    z Robotaxi/Optimus'
  - Obecna pozycja TSLA w portfelu (5 akcji @ $445 entry) jest stratą kapitałową -
    kurs ~$240-260 oznacza ~45% straty, ale decyzja nie opiera się na cenie wejścia
    lecz na tezie
  - Teza dla istniejącej pozycji TSLA była prawdopodobnie oparta na narracji technologicznej,
    nie na flywheel screen - wymaga ponownej oceny od zera zgodnie z zasadą frameworku
  - 'CEO key-man risk jest strukturalny i niemożliwy do wyceny: $39-40B insider selling
    2021-2024 jest najsilniejszym dostępnym sygnałem misalignment interesów'
  - Brak pozytywnych katalizatorów w 12-miesięcznym horyzoncie które zmieniłyby wynik
    flywheel screen z 2/5 na 3/5
  stop_loss_price: 0
  stop_loss_fundamental: 'PASS nie jest decyzją HOLD dla istniejącej pozycji. Istniejąca
    pozycja TSLA (5 akcji) powinna zostać zamknięta przy najbliższej okazji rynkowej
    ponieważ: (1) teza fundamentalna nie spełnia wymogów frameworku - 2/5 kryteriów
    flywheel, (2) zmiana tezy (erozja marż, CEO distraction, BYD competition) wymagała
    ponownej oceny od zera - i ta ocena daje REJECT, (3) kapitał uwolniony ze stratnej
    pozycji, która nie spełnia kryteriów, jest lepiej alokowany w gotówce oczekującej
    na właściwą okazję flywheel. Trigger wyjścia: natychmiastowy przy otwarciu rynku
    - nie ma uzasadnienia fundamentalnego dla dalszego trzymania.'
  checkin_1yr_criteria: 'Rewizja możliwa wyłącznie jeśli WSZYSTKIE trzy warunki zostaną
    spełnione: (1) Gross margin automotive >20% przez 2 kolejne kwartały przy wolumenie
    >500k/kw - dowód działającego flywheel kosztowego, (2) Robotaxi komercyjne w minimum
    3 miastach USA z publicznymi unit economics: cost-per-mile <$0.50, gross margin
    >40% - dowód nowego strumienia przychodów z mechanicznym flywheel, (3) Elon Musk
    kupuje akcje TSLA za własne środki >$500M (nie wykonanie opcji) - dowód realignment
    of interests po $40B sprzedaży. Bez tych trzech warunków: TSLA pozostaje poza
    universe inwestycyjnym frameworku.'
