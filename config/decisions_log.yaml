decisions:
- decision_id: DEC-001
  date: '2026-04-19'
  ticker: RDDT
  action: PASS
  position_size_pct: 0
  entry_price: 0.0
  entry_price_currency: USD
  core_thesis: Reddit posiada realny network effect i unikalny corpus danych, ale
    NIE spełnia kryterium 1 (mechaniczne obniżenie kosztów jednostkowych przez skalę)
    - które jest sercem frameworku inwestycyjnego. Spółka osiąga dokładnie minimalny
    próg 3/5 kryteriów, co przy obligatoryjnym charakterze kryterium 1 i narracji
    biegnącej AHEAD fundamentów czyni obecny moment suboptycznym do wejścia. Asymetria
    ryzyka nie spełnia wymogu 3x w scenariuszu bazowym - bull case 3x wymaga jednoczesnego
    spełnienia trzech trudnych warunków (wzrost ARPU, scaling data licensing, utrzymanie
    premium multiple). PASS do weryfikacji konkretnych triggerów fundamentalnych.
  key_assumptions:
  - Kryterium 1 frameworku (mechaniczne obniżenie kosztów jednostkowych) jest NIESPEŁNIONE
    strukturalnie - moderacja, infrastruktura i trust&safety rosną co najmniej liniowo
    ze skalą, co jest fundamentalną wadą modelu w kontekście naszych zasad inwestycyjnych
  - Spółka spełnia dokładnie 3/5 kryteriów (minimum) przy FAIL na najważniejszym kryterium
    1 - marginalny próg przejścia nie uzasadnia alokacji kapitału w obecnym portfelu
    z 60% gotówki czekającej na lepsze okazje
  - 'Narracja ''AI data moat'' jest AHEAD fundamentów: rynek wycenia sukces Data Licensing
    przy jednym kontrakcie (Google ~60M/rok = 5-8% przychodów), co tworzy asymetrię
    ryzyka niekorzystną - więcej do stracenia przy rozczarowaniu niż do zyskania przy
    potwierdzeniu'
  - Management track record jako spółka publiczna wynosi <2 lata (IPO marzec 2024)
    przy historii wieloletniego cash burning pre-IPO - kryterium 5 niespełnione, zbyt
    krótka historia do weryfikacji filozofii reinwestycji
  - Koncentracja ~98% przychodów z reklam tworzy jednostronną ekspozycję na cykl digital
    ad spend - brak dywersyfikacji przy braku GAAP profitability eliminuje bufor w
    środowisku risk-off
  - Podwójna zależność od Google (ruch organiczny SEO + kontrakt data licensing) jest
    niedowycenionym ryzykiem koncentracji - jeden podmiot może jednocześnie odebrać
    ruch i nie odnowić kontraktu
  - Premortem wskazuje że spółka spełniała dokładnie minimalny próg kryteriów - to
    red flag sam w sobie; FAIL na kryterium 1 powinien prowadzić do REJECT niezależnie
    od innych kryteriów według logiki frameworku
  stop_loss_price: 0
  stop_loss_fundamental: 'Nie dotyczy - brak pozycji. Trigger do ponownej oceny (nie
    automatyczny buy): (1) ARPU USA przekracza $18 annualized potwierdzając ścieżkę
    do $25+ (weryfikacja Q2 2025 earnings ~sierpień 2025); (2) Data Licensing osiąga
    $150M+ z minimum 3 różnymi klientami AI (eliminuje koncentrację Google); (3) DAU
    growth utrzymuje >25% YoY przez 3 consecutive kwartały przy rosnącym ARPU non-US
    powyżej $4; (4) Gross margin stabilizuje się lub rośnie pomimo skalowania moderacji
    (dowód ukrytej efektywności kosztowej przy skali - częściowe spełnienie kryterium
    1). Minimum 3 z 4 powyższych triggerów wymagane do zmiany decyzji na BUY.'
  checkin_1yr_criteria: 'Revisit styczeń 2026: (1) Czy Data Licensing przekroczyło
    $200M TTM z dywersyfikacją ponad Google? (2) Czy ARPU USA wykazuje trajektorię
    do $20+ do końca 2026? (3) Czy management dostarczył wiarygodny target FCF breakeven
    i go realizuje? (4) Czy DAU growth utrzymał >20% CAGR przez ostatnie 4 kwartały?
    (5) Czy pojawiły się sygnały że kryterium 1 (efektywność kosztowa przy skali)
    zaczyna działać przez AI-powered moderation redukującą koszt jednostkowy? Brak
    spełnienia minimum 3 z 5 = podtrzymanie PASS. Spełnienie 4-5 = inicjacja pozycji
    do 10% portfela jako próbna.'
  scores:
    fundamental: 3
    technical: 6
    sentiment: 6
