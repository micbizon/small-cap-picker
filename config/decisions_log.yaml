- decision_id: DEC-003
  date: '2026-04-19'
  ticker: DUOL
  action: BUY
  position_size_pct: 12
  entry_price: 0.0
  entry_price_currency: USD
  core_thesis: Duolingo spełnia 4 z 5 kryteriów flywheel (data-driven koszt jednostkowy,
    retencja niezależna od ceny, TAM z niską penetracją, management reinwestujący)
    i jest jedyną skalowaną, FCF-dodatnią platformą edukacyjną z prawdziwym data flywheel.
    Inicjuję próbną pozycję 12% (poniżej progu 15% dla nowej pozycji) przy obecnych
    poziomach cenowych w przedziale technicznym $185-215, który analiza techniczna
    identyfikuje jako strefę wsparcia/akumulacji z korzystnym R/R. Asymetria 3x jest
    ciasna przy obecnej wycenie, ale realna przy scenariuszu bull z przyspieszeniem
    monetyzacji Max tier i DET. Pozycja próbna - możliwość dołożenia gdy teza się
    potwierdza w danych Q2/Q3 2025. Portfel ma 60% gotówki, więc 12% pozycja nie narusza
    żadnych limitów i pozostawia dużo suchego prochu na inne okazje lub doważenie.
  key_assumptions:
  - DAU growth utrzymuje się powyżej 15% YoY przez kolejne 4 kwartały - poniżej historycznego
    tempa, ale wystarczające do uzasadnienia wyceny
  - Konwersja freemium-to-paid (subscribers/DAU ratio) nie spada poniżej 7% - obecny
    poziom ~7% jest progiem ostrzegawczym, wzrost do 8-9% w 2025 byłby potwierdzeniem
    tezy
  - Duolingo Max adoption rośnie mierzalnie (management zaczyna podawać konkretne
    liczby, nie tylko jakościowe komentarze) - brak disclosure po Q2 2025 to red flag
  - Duolingo English Test przychody rosną >40% YoY w 2025 - walidacja tezy o ekspansji
    poza języki jako core business
  - Brak ogłoszenia przez OpenAI/Google dedykowanej aplikacji do nauki języków z pełną
    gamifikacją i curriculum w H1 2025 - to byłoby przyspieszenie scenariusza commodityzacji
  stop_loss_price: 158
  stop_loss_fundamental: 'Wyjście fundamentalne niezależnie od ceny przy: (1) DAU
    growth poniżej 10% YoY przez dwa kolejne kwartały - sygnał że nawyk/retencja nie
    jest tak silna jak zakładano; (2) Spadek subscribers/DAU ratio poniżej 6.5% -
    rewersja konwersji sugeruje że produkt traci wartość dla segmentu płatnego; (3)
    Ogłoszenie przez OpenAI lub Google dedykowanej, gamifikowanej platformy językowej
    dostępnej w ramach istniejących subskrypcji - strukturalna zmiana krajobrazu konkurencyjnego;
    (4) Rewizja umowy z OpenAI w górę kosztów lub jej wypowiedzenie - Duolingo bez
    AI staje się produktem z 2020 roku. Stop cenowy $158 odpowiada przełamaniu struktury
    bazy akumulacyjnej (61.8% retracement, kluczowe wsparcie wielomiesięczne) na tygodniowym
    zamknięciu.'
  checkin_1yr_criteria: 'Po 12 miesiącach (Q1 2026) teza jest utrzymana jeśli: (1)
    Revenue wzrosło >22% YoY w FY2025 przy jednoczesnym wzroście liczby subskrybentów
    i ARPU - oba muszą rosnąć jednocześnie, nie jeden kosztem drugiego; (2) Duolingo
    Max penetration wśród płatnych subskrybentów przekroczyła 10% z mierzalnym wpływem
    na ARPU (raportowanym liczbo, nie narracyjnie); (3) DET przychody przekroczyły
    $70M annualized - potwierdza ścieżkę do $150M w 2027; (4) Brak materialnego wejścia
    BigTech w gamifikowaną naukę języków; (5) Marża brutto utrzymana powyżej 71% mimo
    wyższych kosztów AI compute. Jeśli mniej niż 3 z 5 kryteriów spełnione - redukuję
    pozycję o 50%. Jeśli 0-1 spełnione - wychodzę całkowicie.'
  scores:
    fundamental: 4
    technical: 7
    sentiment: 62
    ownership: 3
    bull: 78
    bear: 3
  premortem_top_risk: Commodityzacja core produktu przez natywne AI tutory — flywheel
    przestaje być barierą wejścia
