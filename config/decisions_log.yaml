- decision_id: DEC-002
  date: '2026-04-19'
  ticker: ASTS
  action: PASS
  position_size_pct: 0
  entry_price: 0.0
  entry_price_currency: USD
  core_thesis: 'ASTS nie przechodzi minimalnego progu 3/5 kryteriów flywheel. Fundamental
    agent ocenił 2/5 i REJECT — spółka jest pre-revenue komercyjnie, nie ma udowodnionych
    unit economics, flywheel jest spekulatywny a nie mechaniczny. Technika (6/10 WATCH)
    i sentyment (6/10 WATCH) nie zmieniają oceny fundamentalnej — są sygnałami WATCH,
    nie PASS. Dodatkowe twarde odrzucenie: koncentracja przychodów u AT&T/Verizon
    strukturalnie przekracza próg 30%, co jest zasadą nienaruszalną frameworku. Ryzyko
    Starlink D2C jako egzystencjalnego konkurenta jest wysokie i niedoszacowane przez
    rynek. Pułapka sekwencji kapitałowej (potrzebuję kapitału żeby udowodnić economics,
    potrzebuję economics żeby zebrać kapitał) nie jest przejściowa — to strukturalna
    sprzeczność. Gotówka 60% jest cenną opcją którą zachowuję na lepiej skalibrowaną
    okazję spełniającą minimum 3/5 kryteriów flywheel.'
  key_assumptions:
  - Spółka musi osiągnąć twarde komercyjne kontrakty (nie MoU) z gwarantowanymi przychodami
    >$50M ARR z co najmniej 2 operatorami do Q4 2025 — bez tego flywheel pozostaje
    spekulatywny
  - ARPU hurtowe musi być potwierdzone empirycznie w przedziale $3-5/subskrybent/miesiąc
    z cohort retention >85% na poziomie operatora przez minimum 2 kwartały
  - Łączna dilucja od dzisiaj nie może przekroczyć 25% (maksymalnie ~65M nowych akcji)
    zanim spółka osiągnie self-funding z operacji — powyżej tego poziomu asymetria
    3x matematycznie odpada
  - Starlink D2C nie może zdobyć kontraktu z AT&T lub Verizon przed Block 2 ASTS (90
    satelitów) — taki sygnał natychmiast i permanentnie invaliduje tezę
  - FCC nie może nałożyć ograniczeń operacyjnych na podstawie interference z naziecznymi
    sieciami — to ryzyko binarne monitorowane przez obserwację skarg technicznych
    w docket FCC
  stop_loss_price: 0
  stop_loss_fundamental: 'Nie dotyczy — brak pozycji. Trigger do revisit: (1) ogłoszenie
    twardego kontraktu komercyjnego (nie MoU) z AT&T lub Verizon z minimalną gwarancją
    przychodów >$50M/rok; (2) dwa kolejne kwartały danych pokazujących komercyjne
    ARPU i retention na poziomie zgodnym z modelem flywheel; (3) Block 2 manifest
    wystrzelenia z potwierdzonymi datami i finansowaniem bez emisji >25% dilucji od
    obecnego poziomu. Trigger do trwałego odrzucenia: podpisanie kontraktu Starlink
    D2C z AT&T lub Verizon, lub FCC interference ruling ograniczający operacje.'
  checkin_1yr_criteria: 'Q1 2026 — co musi być prawdą: (1) minimum 20 satelitów Block
    2 operacyjnych i generujących przychody komercyjne; (2) ARR >$50M z twardych kontraktów
    (nie engineering services ani granty); (3) brak emisji akcji przekraczającej łącznie
    30M nowych akcji od Q1 2025; (4) AT&T i Verizon nie podpisały równoległych umów
    z Starlink D2C; (5) burn rate nie przekracza $120M/kwartał. Jeśli 3 z 5 warunków
    spełnione — revisit z pełną analizą fundamentalną. Jeśli mniej niż 3 — permanentne
    odrzucenie bez ponownej analizy przez minimum 24 miesiące.'
  scores:
    fundamental: 2
    technical: 6
    sentiment: 6
    ownership: 3
    bull: 4
    bear: 2
  premortem_top_risk: Starlink Direct-to-Cell osiąga masową adopcję przez operatorów
    telko zanim ASTS zbuduje konstelację wystarczającą do komercyjnej konkurencji,
    eliminując unikalną propozycję wartości ASTS i odbierając kluczowych partnerów
    lub drastycznie obniżając ich skłonność do płacenia
