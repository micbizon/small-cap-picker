- decision_id: DEC-005
  date: '2026-04-19'
  ticker: TEM
  action: PASS
  position_size_pct: 0
  entry_price: 0.0
  entry_price_currency: USD
  core_thesis: 'TEM posiada zalążek flywheel''u danych genomicznych w onkologii, ale
    spełnia tylko minimalne 3/5 kryteriów inwestycyjnych — i to w wersji ''częściowo''.
    Dwa krytyczne węzły flywheelu (mechaniczne obniżanie kosztów jednostkowych w Genomics
    oraz dzielenie korzyści skali z klientem) są strukturalnie słabe lub nieobecne.
    Spółka jest już w portfelu na 20 akcjach @ $40 USD. Analiza Layer 4 potwierdza
    trzy realistyczne ścieżki do -65%: koncentracja klientów Data segment, reimbursement
    cliff w Genomics i Big Tech bundling. Żaden z tych ryzyk nie zmaterializowal się
    ani nie został obalony — teza nie uległa zmianie od momentu wejścia, ale nie uległa
    też potwierdzeniu. Przy pozycji istniejącej i braku nowych danych fundamentalnych,
    prawidłową decyzją jest PASS na zwiększenie ekspozycji, nie zamknięcie pozycji
    (teza wciąż intaktna, choć graniczna) i nie dokupowanie (brak potwierdzenia kluczowych
    założeń).'
  key_assumptions:
  - Segment Data & Services musi wykazać wzrost ≥40% YoY w Q1 2025 (raport ~maj 2025)
    — brak tej dynamiki invaliduje tezę mix-shift jako głównego drivera wartości
  - Koncentracja przychodów Data segment u pojedynczego klienta musi pozostać poniżej
    30% — do weryfikacji w najbliższym 10-Q/10-K; przekroczenie progu = exit
  - 'Blended gross margin musi wykazywać trend wzrostowy kwartał do kwartału (cel:
    ≥50% do Q4 2025) — jako dowód że mix-shift w stronę Data faktycznie poprawia ekonomikę'
  - Brak istotnej sprzedaży akcji przez insiderów C-suite na otwartym rynku po wygaśnięciu
    lock-upów — monitorować SEC Form 4 co miesiąc
  stop_loss_price: 28.5
  stop_loss_fundamental: 'Wyjście z istniejącej pozycji (nie dotyczy nowego BUY bo
    PASS) przy spełnieniu KTÓREGOKOLWIEK z warunków: (1) Data segment rośnie <25%
    YoY przez dwa kolejne kwartały — invaliduje tezę mix-shift; (2) Jeden klient farmaceutyczny
    potwierdza udział >30% przychodów Data segment w ujawnieniach SEC; (3) CMS wydaje
    niekorzystną Local Coverage Determination ograniczającą refundację NGS — monitorować
    Federal Register; (4) Tygodniowe zamknięcie poniżej $28.50 USD (techniczny poziom
    invalidacji setupu, zbieżny z dnem korekty post-IPO)'
  checkin_1yr_criteria: 'Po 12 miesiącach (styczeń 2026) teza jest podtrzymana TYLKO
    jeśli jednocześnie: (1) Data & Services segment stanowi ≥42% skonsolidowanych
    przychodów (vs ~37-40% obecnie) — mierzalny mix-shift; (2) Blended gross margin
    ≥52% (vs ~47-49% obecnie) — dowód ekonomiki platform vs lab; (3) Revenue Data
